<!DOCTYPE html>
<html>
<head>
    <title>Login / Registro</title>
    <style>
        body { background: #0f172a; color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        input { margin: 5px; padding: 10px; border-radius: 5px; border: none; }
        button { margin: 5px; padding: 10px 20px; border-radius: 5px; background: #10b981; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background: #059669; }
        .mensaje { margin-top: 10px; color: #fbbf24; }
    </style>
</head>
<body>
    <h1>Login / Registro</h1>
    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <br>
        <button name="accion" value="login">Iniciar sesión</button>
        <button name="accion" value="registrar">Registrarse</button>
    </form>
    {% if mensaje %}
        <div class="mensaje">{{ mensaje }}</div>
    {% endif %}
</body>
</html>
